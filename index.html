<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猫AI - グラフ解決版</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: #fff5f5; }
        #cat-container { position: relative; width: 100vw; height: 45vh; display: flex; justify-content: center; align-items: flex-end; margin-top: 80px; }
        #cat-body { width: 80%; max-width: 350px; height: auto; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        @keyframes pakupaku { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-10px); } }
        #msg-box { background: white; border-radius: 20px; padding: 15px; width: 85%; text-align: center; font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; min-height: 80px; }
        #talk-btn { position: fixed; bottom: 30px; width: 120px; height: 120px; border-radius: 50%; border: none; background: #ff4081; color: white; font-size: 18px; font-weight: bold; touch-action: none; }
        #status-log { color: red; font-size: 11px; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div id="cat-container"><img src="IMG_4936.jpeg" id="cat-body" alt="cat"></div>
    <div id="msg-box">
        ボタンを【長押し】して話して！<br>離すと送信するぞ！
        <span id="status-log"></span>
    </div>
    <button id="talk-btn" onpointerdown="startRec()" onpointerup="stopRec()">長押しで<br>話すぞ！</button>

    <script>
        const API_KEY = "AIzaSyBfoNa8ysLj71atZQpc-9tZln5_s4__Ogs"; 
        const statusLog = document.getElementById('status-log');
        const catBody = document.getElementById('cat-body');

        const recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        recognition.lang = 'ja-JP';

        function startRec() {
            window.speechSynthesis.cancel();
            recognition.start();
            statusLog.innerText = "聴いてるぞ...";
        }

        function stopRec() {
            recognition.stop();
            statusLog.innerText = "送信中...";
        }

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('msg-box').innerHTML = "「" + text + "」だな！<br>考え中だよ...<br><span id='status-log'></span>";
            
            // ★最新の安定版URLだぞ★
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "生意気な猫として10文字以内で返せ:" + text }] }]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    // ここで400や404の本当の理由を表示するぞ！
                    statusLog.innerText = "❌Googleの回答：" + data.error.message;
                } else {
                    const reply = data.candidates[0].content.parts[0].text;
                    document.getElementById('msg-box').innerHTML = reply + "<br><span id='status-log'></span>";
                    const uttr = new SpeechSynthesisUtterance(reply);
                    uttr.onstart = () => catBody.style.animation = 'pakupaku 0.15s infinite';
                    uttr.onend = () => catBody.style.animation = 'breathe 4s infinite';
                    window.speechSynthesis.speak(uttr);
                }
            } catch (e) {
                statusLog.innerText = "❌通信エラーだにゃ";
            }
        };
    </script>
</body>
</html>
