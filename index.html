<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生意気猫AI - トランシーバー版</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: #fff5f5; user-select: none; -webkit-user-select: none; }
        #cat-container { position: relative; width: 100vw; height: 45vh; display: flex; justify-content: center; align-items: flex-end; margin-top: 80px; }
        #cat-body { width: 80%; max-width: 350px; height: auto; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        @keyframes pakupaku { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-10px); } }
        #msg-box { background: white; border-radius: 20px; padding: 15px; width: 85%; text-align: center; font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; min-height: 80px; }
        #talk-btn { position: fixed; bottom: 30px; width: 120px; height: 120px; border-radius: 50%; border: none; background: #ff4081; color: white; font-size: 18px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); touch-action: none; }
        #status-log { color: red; font-size: 11px; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div id="cat-container"><img src="IMG_4936.jpeg" id="cat-body" alt="cat"></div>
    <div id="msg-box">
        ボタンを【押しっぱなし】にして話して！<br>離すとAIに送るぞ！
        <span id="status-log"></span>
    </div>
    <button id="talk-btn">押しながら<br>話すぞ！</button>

    <script>
        const API_KEY = "AIzaSyBfoNa8ysLj71atZQpc-9tZln5_s4__Ogs"; 
        const talkBtn = document.getElementById('talk-btn');
        const msgBox = document.getElementById('msg-box');
        const statusLog = document.getElementById('status-log');
        const catBody = document.getElementById('cat-body');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;

        // ボタンを押し始めた時
        talkBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            try {
                window.speechSynthesis.cancel();
                recognition.start();
                talkBtn.style.background = "#f50057";
                talkBtn.innerText = "聴いてるぞ！";
                statusLog.innerText = "";
            } catch(err) { console.log(err); }
        });

        // ボタンを離した時
        talkBtn.addEventListener('pointerup', (e) => {
            e.preventDefault();
            recognition.stop();
            talkBtn.style.background = "#ff4081";
            talkBtn.innerText = "送信中...";
        });

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            msgBox.innerHTML = "「" + text + "」だな！<br>AIに聞いてくるぞ...<br><span id='status-log'></span>";
            
            const reply = await getAI(text);
            msgBox.innerHTML = reply + "<br><span id='status-log'></span>";
            speak(reply);
            talkBtn.innerText = "押しながら\n話すぞ！";
        };

        async function getAI(input) {
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "生意気な猫として10文字以内で返せ:" + input }] }] })
                });
                const data = await res.json();
                if (data.error) {
                    document.getElementById('status-log').innerText = "❌理由：" + data.error.message;
                    return "エラーだ！";
                }
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                document.getElementById('status-log').innerText = "❌通信失敗";
                return "ネットがダメだぞ！";
            }
        }

        function speak(text) {
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'ja-JP'; s.pitch = 1.8;
            s.onstart = () => { catBody.style.animation = 'pakupaku 0.15s infinite'; };
            s.onend = () => { catBody.style.animation = 'breathe 4s infinite'; };
            window.speechSynthesis.speak(s);
        }
    </script>
</body>
</html>
