<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生意気猫AI - 最終接続テスト</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: #fff5f5; }
        #header-ui { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(255,255,255,0.9); display: flex; justify-content: space-around; align-items: center; z-index: 100; border-bottom: 1px solid #ddd; }
        #cat-container { position: relative; width: 100vw; height: 50vh; display: flex; justify-content: center; align-items: flex-end; margin-top: 80px; }
        #cat-body { width: 85%; max-width: 350px; height: auto; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        @keyframes pakupaku { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-10px); } }
        #msg-box { background: white; border-radius: 20px; padding: 15px; width: 85%; max-width: 500px; text-align: center; font-weight: bold; font-size: 16px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; min-height: 50px; }
        #talk-btn { position: fixed; bottom: 30px; width: 90px; height: 90px; border-radius: 50%; border: none; background: #ff4081; color: white; font-size: 18px; font-weight: bold; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="header-ui">
        <select id="select-person"><option value="父">父ちゃん</option><option value="母">ママ</option><option value="のぶ">のぶ</option><option value="けん">けんちゃん</option></select>
        <select id="select-place"><option value="家">家</option><option value="病院">病院</option><option value="職場">職場</option></select>
    </div>
    <div id="cat-container"><img src="IMG_4936.jpeg" id="cat-body" alt="cat"></div>
    <div id="msg-box">1.まずは画面をタップ<br>2.ボタンを長押しして話す</div>
    <button id="talk-btn">話す</button>

    <script>
        // 新しいキーをセットしました
        const API_KEY = "AIzaSyCIYIaRy06HLwagfVJeRYmlkeEXLkX6IiU"; 

        const talkBtn = document.getElementById('talk-btn');
        const msgBox = document.getElementById('msg-box');
        const catBody = document.getElementById('cat-body');

        // 音声認識の準備
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;

        // ボタン操作
        talkBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            window.speechSynthesis.cancel(); // 前の音声を止める
            try {
                recognition.start();
                msgBox.innerText = "聞いてるぞ！...";
                talkBtn.style.background = "#f50057";
            } catch (err) {
                msgBox.innerText = "エラー：もう一回押してだよ！";
                recognition.stop();
            }
        });

        talkBtn.addEventListener('touchend', () => {
            recognition.stop();
            talkBtn.style.background = "#ff4081";
            msgBox.innerText = "送信中だぞ...";
        });

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            msgBox.innerText = "「" + text + "」だな！考え中...";
            const reply = await getAI(text);
            msgBox.innerText = reply;
            speak(reply);
        };

        async function getAI(input) {
            const person = document.getElementById('select-person').value;
            const place = document.getElementById('select-place').value;
            const prompt = `あなたは生意気な子猫。一人称はぼく。相手は${person}。場所は${place}。語尾は「ぞ！」「だよ！」限定。15文字以内。返答：${input}`;
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                if (data.error) return "APIエラーだぞ！";
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                return "通信エラーだぞ！";
            }
        }

        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.pitch = 1.8;
            uttr.onstart = () => { catBody.style.animation = 'pakupaku 0.15s infinite'; };
            uttr.onend = () => { catBody.style.animation = 'breathe 4s infinite'; };
            window.speechSynthesis.speak(uttr);
        }

        // iPhone対策：最初のタップで音声を有効化
        document.body.addEventListener('touchstart', () => {
            const s = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(s);
        }, {once: true});
    </script>
</body>
</html>
